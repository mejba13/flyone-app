name: flyone
description: AI-powered travel booking platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  dio: ^5.7.0
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
